<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.mistral.ai https://api.openai.com https://api.anthropic.com http://localhost:11434;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fumii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* ── Google Fonts ─────────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    /* ── Design tokens ────────────────────────────────────────────────── */
    :root {
      /* Core dark palette */
      --color-bg:             #0D0F14;
      --color-surface:        #13151C;
      --color-surface-raised: #1C1F2A;
      --color-surface-hover:  #222536;

      /* Sidebar gets its own deeper shade */
      --color-sidebar:        #0A0C11;
      --color-sidebar-border: rgba(255,255,255,0.06);

      /* Brand: vibrant indigo/violet */
      --color-primary:        #7C6EFA;
      --color-primary-soft:   rgba(124, 110, 250, 0.12);
      --color-primary-glow:   rgba(124, 110, 250, 0.25);
      --color-accent:         #A78BFA;
      --color-accent-2:       #EC4899;

      /* Text */
      --color-text-primary:   #F0F2FF;
      --color-text-secondary: rgba(240, 242, 255, 0.45);
      --color-text-muted:     rgba(240, 242, 255, 0.25);

      /* Functional */
      --color-border:         rgba(255, 255, 255, 0.07);
      --color-border-active:  rgba(124, 110, 250, 0.35);
      --color-danger:         #F87171;
      --color-success:        #34D399;

      /* Typography */
      --font-display: 'Inter', system-ui, sans-serif;
      --font-mono:    'Courier New', monospace;

      /* Spacing & radii */
      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   16px;
      --radius-full: 9999px;

      /* Shadows */
      --shadow-card:       0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      --shadow-card-hover: 0 4px 24px rgba(124, 110, 250, 0.15), 0 1px 4px rgba(0,0,0,0.4);
      --glow-primary:      0 0 20px rgba(124, 110, 250, 0.3), 0 0 60px rgba(124, 110, 250, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-display);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root { height: 100%; }

    ::-webkit-scrollbar          { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track    { background: transparent; }
    ::-webkit-scrollbar-thumb    { background: rgba(255,255,255,0.1); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .no-select { user-select: none; -webkit-user-select: none; }
    .drag-region { -webkit-app-region: drag; }
    .no-drag     { -webkit-app-region: no-drag; }

    /* ── Animations ──────────────────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
      50%      { opacity: 0.8; box-shadow: 0 0 0 4px rgba(52, 211, 153, 0); }
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page-enter {
      animation: slideUp 380ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-card);
      transition: box-shadow 220ms ease, border-color 220ms ease, transform 220ms ease;
    }

    .card:hover {
      box-shadow: var(--shadow-card-hover);
      border-color: var(--color-border-active);
      transform: translateY(-2px);
    }

    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 60ms; }
    .stagger-3 { animation-delay: 120ms; }
    .stagger-4 { animation-delay: 180ms; }
    .stagger-5 { animation-delay: 240ms; }

    /* Focus ring */
    input:focus, select:focus, textarea:focus {
      border-color: var(--color-primary) !important;
      box-shadow: 0 0 0 3px var(--color-primary-soft);
      outline: none;
    }

    /* Button base reset */
    button {
      font-family: var(--font-display);
      cursor: pointer;
      border: none;
      background: none;
      outline: none;
    }

    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/dashboard/main.tsx"></script>
</body>
</html>
