<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.mistral.ai https://api.openai.com https://api.anthropic.com http://localhost:11434;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fumii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ────────────────────────────────────────────────── */
    :root {
      --color-bg:             transparent;
      --color-surface:        rgba(252, 252, 240, 0.94);
      --color-surface-raised: rgba(252, 252, 240, 0.98);
      --color-primary:        #2D6BB1;
      --color-primary-soft:   rgba(45, 107, 177, 0.12);
      --color-sage:           #BAC98D;
      --color-yellow:         #EEE29E;
      --color-text-primary:   #1A2433;
      --color-text-secondary: #4A5568;
      --color-text-fumii:     #2D6BB1;
      --color-border:         rgba(45, 107, 177, 0.14);
      --color-danger:         #E53E3E;
      --glow-primary: 0 0 20px rgba(45, 107, 177, 0.28), 0 0 60px rgba(45, 107, 177, 0.10);
      --font-display: 'DM Sans', sans-serif;
      --font-mono:    'Departure Mono', 'Courier New', monospace;
      --radius-md:   12px;
      --radius-lg:   20px;
      --radius-full: 9999px;
    }

    html, body {
      background: transparent !important;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: var(--font-display);
    }

    #root {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes message-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Thinking bubble ─────────────────────────────────────────────── */
    .thinking-bubble {
      position: absolute;
      bottom: calc(60px + 128px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      align-items: center;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: 7px 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--glow-primary);
      animation: bubble-in 180ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      z-index: 20;
    }

    .thinking-tail {
      position: absolute;
      bottom: -6px;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
      transform: translateX(-50%) rotate(45deg);
    }

    .thinking-dot {
      width: 5px;
      height: 5px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      animation: thinking-bounce 1.4s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.18s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes thinking-bounce {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.4; }
      40%           { transform: scale(1.0);  opacity: 1.0; }
    }

    @keyframes bubble-in {
      from { opacity: 0; transform: translateX(-50%) translateY(6px) scale(0.92); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0)   scale(1.0);  }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/sprite/main.tsx"></script>
</body>
</html>
